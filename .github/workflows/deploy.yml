name: fastapi를 aws linux에 배포하기

on: 
  push:
    branches: ["master"] #master 브렌치에 puth될때 아래의 job을 실행해라 라는 의미

jobs: 
  deploy:
    runs-on: ubuntu-latest
    step:
      -name: ssh 원격 명령
       uses: appleboy/ssh-action@master
       with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_USER }}
        port: 22
        script: |
          # 1. 프로젝트 경로 이동
          cd ~/hello_fastapi

          #2. git이 설치되어 있고 최초 한번 clone되어 있다는 가정하에서 pull하기
          git pull origin master

          # 3. python 가상환경 활성화 및 의존성 없데이트
          source venv/bn/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          #4. 실행중인 프로세스가 있으면 종료
          fuser -k 8000/tcp || true
          
          #5. nohup으로 실행하고 로그는 app.log에 남기기
          nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &
 
